<style>
.visual-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    column-gap: 1rem;
    row-gap: 1rem;
}
.prose img {
  margin-top: 0 !important;
  margin-bottom: 0 !important;
  background: none !important;
  box-shadow: none !important;
  border-radius: 0 !important;
}
.visual-grid a {
    display: block;
    width: 100%;
    height: 100%;
    padding: 0;
    margin: 0;
    cursor: pointer;
}
.visual-grid .visual-tile {
    position: relative;
    width: 100%;
    height: 100%;
    aspect-ratio: 1 / 1;
    overflow: hidden;
}
.visual-grid a[colspan="2"] { grid-column: span 2; aspect-ratio: 2/1; }
.visual-grid a[colspan="3"] { grid-column: span 3; aspect-ratio: 3/1; }
.visual-grid img.nozoom {
    width: 100%; height: 100%; object-fit: cover; border: none; transition: filter 0.2s; display: block;
}
.visual-grid a:hover img.nozoom.invert { filter: invert(1); }
.visual-grid img.invert { filter: none; }
.visual-grid .visual-title {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; background: rgba(0,0,0,0.6); opacity: 0; transition: opacity 0.2s;
    font-size: 1.2rem; font-weight: bold; text-align: center; pointer-events: none;
}
.visual-grid a:hover .visual-title { opacity: 1; }
</style>

{{ $csvResource := resources.Get "data/visualizations.csv" }}
{{ $csv := $csvResource | transform.Unmarshal }}
{{ $cols := 3 }}

<div class="visual-grid">
    {{ range $i, $row := $csv }}
        {{ if ne $i 0 }}
            <a href="{{ index $row 1 | relURL }}" colspan="{{ index $row 3 | default "1" }}">
                <div class="visual-tile">
                    <img class="nozoom{{ if eq (lower (index $row 4 | default "false")) "true" }} invert{{ end }}" 
                         src="{{ index $row 0 | relURL }}" 
                         alt="{{ index $row 2 }}">
                    <div class="visual-title">{{ index $row 2 }}</div>
                </div>
            </a>
        {{ end }}
    {{ end }}
</div>
